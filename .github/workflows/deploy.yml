name: Deploy Shine Connect

on:
  push:
    branches: [main, develop, dev-connect]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: sisbios/shinebuild-app
  CHANNEL: ${{ github.ref_name == 'main' && 'prod' || 'dev' }}

concurrency:
  group: deploy-connect-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      sha_short: ${{ steps.vars.outputs.sha_short }}
      tag: ${{ steps.vars.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - id: vars
        run: |
          SHA=$(git rev-parse --short HEAD)
          echo "sha_short=$SHA" >> $GITHUB_OUTPUT
          echo "tag=${{ env.CHANNEL }}-$SHA" >> $GITHUB_OUTPUT

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: sisbios
          password: ${{ secrets.GHCR_PAT }}

      - uses: docker/setup-buildx-action@v3

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.CHANNEL }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.vars.outputs.tag }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache-${{ env.CHANNEL }}
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache-${{ env.CHANNEL }},mode=max
          build-args: |
            GIT_SHA=${{ steps.vars.outputs.sha_short }}
            NEXT_PUBLIC_FIREBASE_API_KEY=${{ secrets.NEXT_PUBLIC_FIREBASE_API_KEY }}
            NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN=${{ secrets.NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN }}
            NEXT_PUBLIC_FIREBASE_PROJECT_ID=${{ secrets.NEXT_PUBLIC_FIREBASE_PROJECT_ID }}
            NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET=${{ secrets.NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET }}
            NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID=${{ secrets.NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}
            NEXT_PUBLIC_FIREBASE_APP_ID=${{ secrets.NEXT_PUBLIC_FIREBASE_APP_ID }}
            NEXT_PUBLIC_FIREBASE_APP_CHECK_SITE_KEY=${{ secrets.NEXT_PUBLIC_FIREBASE_APP_CHECK_SITE_KEY }}
            NEXT_PUBLIC_APP_URL=${{ github.ref_name == 'main' && 'https://connect.shinebuildhub.com' || 'https://dev-connect.shinebuildhub.com' }}

  deploy:
    name: Deploy to leadlumer-vps
    needs: build
    runs-on: [self-hosted, leadlumer-vps]
    environment: ${{ github.ref_name == 'main' && 'production' || 'development' }}

    env:
      CHANNEL: ${{ github.ref_name == 'main' && 'prod' || 'dev' }}
      CONTAINER: connect-${{ github.ref_name == 'main' && 'prod' || 'dev' }}

    steps:
      - name: Pull image and refresh container
        run: |
          set -e
          cd /home/leadlumer/deploy/connect
          FILE=docker-compose.${CHANNEL}.yml
          docker compose -f $FILE pull connect
          docker compose -f $FILE up -d --no-deps connect
          docker image prune -f --filter "label=org.opencontainers.image.source=https://github.com/sisbios/shinebuild-app"

      - name: Health check
        run: |
          for i in 1 2 3 4 5 6; do
            sleep 6
            HEALTH=$(docker inspect ${CONTAINER} --format '{{.State.Health.Status}}' 2>/dev/null || echo unknown)
            echo "attempt $i: $HEALTH"
            if [ "$HEALTH" = "healthy" ]; then
              echo "✓ Deployment healthy"
              exit 0
            fi
          done
          echo "✗ Container did not become healthy"
          docker logs --tail 60 ${CONTAINER}
          exit 1
